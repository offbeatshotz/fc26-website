<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Players Looking for Roster</title>
</head>
<body>
    <h1>Players Looking for Roster</h1>
    {% if players %}
        <ul>
        {% for player in players %}
            <li>{{ player.gamertag }} ({{ player.username }})</li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No players looking for a roster.</p>
    {% endif %}
</body>
</html>
