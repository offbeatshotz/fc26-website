<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournaments</title>
</head>
<body>
    <h1>Upcoming Tournaments</h1>
    {% if tournaments %}
        <ul>
        {% for tournament in tournaments %}
            <li>{{ tournament.name }} - {{ tournament.date.strftime('%Y-%m-%d %H:%M') }} - {{ tournament.description }}</li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No upcoming tournaments.</p>
    {% endif %}
</body>
</html>
